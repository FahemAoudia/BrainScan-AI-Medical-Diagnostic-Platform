services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy  # ينتظر حتى يصبح MySQL جاهزاً تماماً
      mongodb:
        condition: service_started
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rootpassword
      - MYSQL_DB=brainscandb  # تأكد أن هذا الاسم يطابق MYSQL_DATABASE أدناه
      - MONGO_URI=mongodb://mongodb:27017/mydatabase
      # - OPENAI_API_KEY=   # assistant chat — ajouter pour tester le chatbot en local
    networks:
      - mynetwork

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - mynetwork

  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: brainscandb  # قمت بتغييرها لتطابق إعدادات الباكند
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mynetwork

  mongodb:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mynetwork

networks:
  mynetwork:

volumes:
  mysql_data:
  mongo_data: